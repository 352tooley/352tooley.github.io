name: Build PS4 PKG

on:
  push:
    branches: ["**"]
    paths:
      - "ps4-linux-installer/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "ps4-linux-installer/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld make

      - name: Install .NET (for PkgTool.Core)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download OpenOrbis PS4 Toolchain v0.5.4
        run: |
          curl -fSL \
            "https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz" \
            -o /tmp/toolchain.tar.gz
          sudo mkdir -p /opt/OpenOrbis
          sudo tar -xzf /tmp/toolchain.tar.gz -C /opt/OpenOrbis --strip-components=1
          sudo chmod +x /opt/OpenOrbis/PS4Toolchain/bin/linux/*

      - name: Build eboot.bin
        working-directory: ps4-linux-installer
        env:
          OO_PS4_TOOLCHAIN: /opt/OpenOrbis/PS4Toolchain
        run: make

      - name: Build PKG
        working-directory: ps4-linux-installer
        env:
          OO_PS4_TOOLCHAIN: /opt/OpenOrbis/PS4Toolchain
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
        run: make pkg

      - name: Upload eboot.bin
        uses: actions/upload-artifact@v4
        with:
          name: eboot-${{ github.sha }}
          path: ps4-linux-installer/build/eboot.bin
          retention-days: 30

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ github.sha }}
          path: ps4-linux-installer/build/*.pkg
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ps4-linux-installer/build/eboot.bin
            ps4-linux-installer/build/*.pkg
