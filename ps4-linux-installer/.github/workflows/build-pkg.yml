name: Build PS4 Linux Installer PKG

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kernel_arch_url:
        description: "URL to bzImage-arch (leave blank to use repo variable or default)"
        required: false
        default: ""
      kernel_xubuntu_url:
        description: "URL to bzImage-xubuntu (leave blank to use repo variable or default)"
        required: false
        default: ""

# Default kernel URLs — override via repository Variables (Settings → Variables):
#   KERNEL_ARCH_URL, KERNEL_XUBUNTU_URL
env:
  DEFAULT_KERNEL_ARCH_URL:    "https://github.com/fail0verflow/ps4-linux/releases/latest/download/bzImage-arch"
  DEFAULT_KERNEL_XUBUNTU_URL: "https://github.com/fail0verflow/ps4-linux/releases/latest/download/bzImage-xubuntu"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang lld cmake make ninja-build \
          python3 python3-pip \
          wget curl git zip

    - name: Download OpenOrbis PS4 Toolchain
      run: |
        git clone --depth 1 \
          https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain \
          /opt/OpenOrbis/toolchain
        echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis/toolchain" >> $GITHUB_ENV

    - name: Build create-fself and create-oelf tools
      run: |
        cd /opt/OpenOrbis/toolchain
        if [ ! -f bin/create-fself ]; then
          for tool in create-fself create-oelf; do
            if [ -d "src/tools/$tool" ]; then
              cd "src/tools/$tool"
              cmake . -B build -DCMAKE_BUILD_TYPE=Release
              cmake --build build
              cp build/$tool /opt/OpenOrbis/toolchain/bin/ 2>/dev/null || true
              cd /opt/OpenOrbis/toolchain
            fi
          done
        fi

    # ── Kernel images ────────────────────────────────────────────────────────
    # Resolution order (first non-empty wins):
    #   1. workflow_dispatch input
    #   2. Repository variable (Settings → Variables)
    #   3. DEFAULT_KERNEL_*_URL env above
    - name: Resolve kernel URLs
      run: |
        ARCH_URL="${{ github.event.inputs.kernel_arch_url }}"
        [ -z "$ARCH_URL" ] && ARCH_URL="${{ vars.KERNEL_ARCH_URL }}"
        [ -z "$ARCH_URL" ] && ARCH_URL="$DEFAULT_KERNEL_ARCH_URL"

        XUBUNTU_URL="${{ github.event.inputs.kernel_xubuntu_url }}"
        [ -z "$XUBUNTU_URL" ] && XUBUNTU_URL="${{ vars.KERNEL_XUBUNTU_URL }}"
        [ -z "$XUBUNTU_URL" ] && XUBUNTU_URL="$DEFAULT_KERNEL_XUBUNTU_URL"

        echo "KERNEL_ARCH_URL=$ARCH_URL"       >> $GITHUB_ENV
        echo "KERNEL_XUBUNTU_URL=$XUBUNTU_URL" >> $GITHUB_ENV
        echo "Arch kernel:    $ARCH_URL"
        echo "Xubuntu kernel: $XUBUNTU_URL"

    - name: Cache kernel images
      id: kernel-cache
      uses: actions/cache@v4
      with:
        path: assets/kernels
        key: kernels-${{ env.KERNEL_ARCH_URL }}-${{ env.KERNEL_XUBUNTU_URL }}

    - name: Fetch kernel images
      if: steps.kernel-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p assets/kernels
        KERNEL_BUNDLED=false

        echo "--- Fetching bzImage-arch ---"
        if curl -fsSL --retry 3 --retry-delay 5 \
               -o assets/kernels/bzImage-arch \
               "$KERNEL_ARCH_URL"; then
          echo "bzImage-arch OK ($(du -sh assets/kernels/bzImage-arch | cut -f1))"
          KERNEL_BUNDLED=true
        else
          echo "::warning::Could not fetch bzImage-arch from $KERNEL_ARCH_URL — Arch distro will require manual kernel placement"
        fi

        echo "--- Fetching bzImage-xubuntu ---"
        if curl -fsSL --retry 3 --retry-delay 5 \
               -o assets/kernels/bzImage-xubuntu \
               "$KERNEL_XUBUNTU_URL"; then
          echo "bzImage-xubuntu OK ($(du -sh assets/kernels/bzImage-xubuntu | cut -f1))"
          KERNEL_BUNDLED=true
        else
          echo "::warning::Could not fetch bzImage-xubuntu from $KERNEL_XUBUNTU_URL — Xubuntu distro will require manual kernel placement"
        fi

        echo "KERNEL_BUNDLED=$KERNEL_BUNDLED" >> $GITHUB_ENV

    - name: Report kernel status
      run: |
        echo "### Kernel images" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        for kfile in bzImage-arch bzImage-xubuntu; do
          if [ -f "assets/kernels/$kfile" ]; then
            sz=$(du -sh "assets/kernels/$kfile" | cut -f1)
            echo "- ✅ \`$kfile\` bundled ($sz)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️  \`$kfile\` **not bundled** — must be placed at \`/data/ps4linux/kernels/$kfile\` on PS4 manually" >> $GITHUB_STEP_SUMMARY
          fi
        done
        echo "" >> $GITHUB_STEP_SUMMARY
    # ─────────────────────────────────────────────────────────────────────────

    - name: Generate param.sfo
      run: |
        python3 tools/create_param_sfo.py sce_sys/param.sfo

    - name: Build eboot.bin
      run: |
        export OO_PS4_TOOLCHAIN=/opt/OpenOrbis/toolchain
        make -j$(nproc)

    - name: Package PKG structure
      run: |
        mkdir -p pkg_out/sce_sys
        mkdir -p pkg_out/assets/payloads
        mkdir -p pkg_out/assets/kernels
        cp build/eboot.bin         pkg_out/
        cp sce_sys/param.sfo       pkg_out/sce_sys/
        cp sce_sys/icon0.png       pkg_out/sce_sys/ 2>/dev/null || \
          convert -size 512x512 xc:#1a1a2e pkg_out/sce_sys/icon0.png 2>/dev/null || \
          echo "Warning: icon0.png not found, PKG may lack icon"
        cp assets/payloads/README.md pkg_out/assets/payloads/
        cp assets/kernels/README.md  pkg_out/assets/kernels/
        # Copy fetched kernels if present
        for kfile in bzImage-arch bzImage-xubuntu; do
          if [ -f "assets/kernels/$kfile" ]; then
            cp "assets/kernels/$kfile" "pkg_out/assets/kernels/$kfile"
            echo "Bundled: $kfile"
          fi
        done

    - name: Build PKG (if create-pkg available)
      run: |
        export OO_PS4_TOOLCHAIN=/opt/OpenOrbis/toolchain
        if [ -f "$OO_PS4_TOOLCHAIN/bin/create-pkg" ]; then
          bash scripts/build_pkg.sh
        else
          echo "create-pkg not available — uploading PKG structure as artifact"
          cd pkg_out && zip -r ../build/ps4-linux-installer-pkg.zip .
        fi
      continue-on-error: true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ps4-linux-installer-pkg
        path: |
          build/eboot.bin
          build/ps4-linux-installer.pkg
          build/ps4-linux-installer-pkg.zip
          sce_sys/param.sfo
        if-no-files-found: warn
        retention-days: 30

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "build-${{ github.run_number }}"
        name: "PS4 Linux Installer Build #${{ github.run_number }}"
        body: |
          Automated build from commit ${{ github.sha }}

          ## Installation
          1. Download `ps4-linux-installer.pkg` (or the zip if PKG not available)
          2. Transfer to PS4 via FTP (GoldHEN FTP, port 2121)
          3. Install via GoldHEN Package Installer
          4. Launch the app — it will download rootfs images on first run

          ## Kernel images
          Kernel images are **bundled inside this PKG** if the download succeeded during CI.
          If your distro's kernel is missing, place it manually at `/data/ps4linux/kernels/` on the PS4.

          To use custom kernel URLs, go to **Actions → Run workflow** and supply URLs,
          or set `KERNEL_ARCH_URL` / `KERNEL_XUBUNTU_URL` in **Settings → Variables**.

          ## Notes
          - Requires jailbroken PS4 with GoldHEN
          - Compatible with FW 5.05 – 12.52
        files: |
          build/ps4-linux-installer.pkg
          build/ps4-linux-installer-pkg.zip
          build/eboot.bin
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      run: |
        echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        for f in build/eboot.bin build/ps4-linux-installer.pkg; do
          if [ -f "$f" ]; then
            size=$(du -sh "$f" | cut -f1)
            echo "| \`$f\` | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done
